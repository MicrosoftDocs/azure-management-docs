### YamlMime:Landing

title: Microsoft Azure Linux
summary: Azure Linux is a Microsoft-maintained, open-source Linux distribution built for Azure that provides a lightweight, security-hardened operating system for virtual machines (VMs), containers, and Kubernetes clusters running on Azure infrastructure.

