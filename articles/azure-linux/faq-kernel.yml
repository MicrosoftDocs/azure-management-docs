title: "Azure Linux frequently asked questions (FAQ) - Kernel"
summary: |
    This article provides answers to some of the most common questions about the Azure Linux kernel, including how to select a kernel version, manage kernel modules, and export kernel dumps for debugging.

sections:
  - name: Ignored
    questions:
      - question: |
          How is the kernel version selected for a given Azure Linux release?
        answer: |
          The kernel version selected is the current long-term support (LTS) kernel at the time of the Azure Linux major release. For example, Azure Linux 4.0 ships with the LTS kernel version 6.18. The LTS kernel is supported for four years from GA and receives monthly CVE backports with fast-track patches for _Critical_ and _High_ severity issues.

          Azure Linux also offers a Hardware Enablement (HWE) kernel for workloads that need new hardware support or GPU enablement. The HWE kernel has a shorter lifecycle of approximately 14 months. For more information, see [Azure Linux release cadence and lifecycle](./release-cadence-lifecycle.md).

      - question: |
          What is the kernel versioning convention?
        answer: |
          Azure Linux kernel versions follow the format `Major.Minor.Patch.Integration-Release.alN`, where:

          - **Major.Minor** is the upstream LTS kernel version (for example, 6.18).
          - **Patch** is the upstream LTS patch number from `kernel.org`.
          - **Integration** is the internal integration number for updates on top of the upstream LTS release.
          - **Release** is the RPM package release number, used when the RPM packaging definition is updated.
          - **alN** indicates the Azure Linux version (for example, `al4` for Azure Linux 4.0).

          You can check your running kernel version using the `uname -r` command.

      - question: |
          How do I manage kernel modules?
        answer: |
          Azure Linux enables kernel lockdown in integrity mode when Secure Boot is active, which prevents loading unsigned kernel modules. For development, you can disable lockdown by removing `lockdown=integrity` from the kernel boot parameters in `/boot/grub2/grub.cfg` and rebooting. For production, sign your kernel modules. 

          For more information, see [Manage the Azure Linux kernel](./kernel-management.md).

      - question: |
          What are the recommended sizing and placement guidelines for /var/crash when using kdump?
        answer: |
          A kdump vmcore is a snapshot of the system’s physical memory at the time of a crash, and its size can be close to the total installed RAM.

          In Azure Linux, vmcore files are stored by default on the operating system (OS) disk under /var/crash. Storing vmcore files there can rapidly consume available space, potentially leading to disk exhaustion and affecting overall system stability. To avoid this, we recommend the following best practices for /var/crash:

          - Provision a dedicated data disk crash dumps instead of relying on the OS disk.
          - Size the dedicated data disk to at least equal to the system’s total physical memory.
          - Mount the dedicated data disk to /var/crash.
          - Avoid using temporary disks (such as /mnt or /mnt/resource), as they aren't persistent in Azure.

      - question: |
          How do I export a kernel dump for debugging (for example, after a kernel oops)?
        answer: |
          Azure Watson provides this functionality and is enabled on Azure Linux.
